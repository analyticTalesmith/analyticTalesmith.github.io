s through scraping depending on the topic of your project, and simulating data is always an option if you want the data to practice your data skills rather than to generate actionable insights and recommendations or to contribute novel knowledge through research. Whether you are brainstorming possible projects or in the discovery and information-gathering stage of a current project, the following sources can help you find valuable, reputable, and free datasets to use in your data projects.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-9f77a4a\" id=\"1-a-href-https-github-com-awesomedata-awesome-public-datasets-title-awesome-public-datasets-repo-a\" data-block-id=\"9f77a4a\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e1) \u003ca href=\"https://github.com/awesomedata/awesome-public-datasets\" title=\"\"\u003eAwesome Public Datasets Repo\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-01d986d\" data-block-id=\"01d986d\"\u003e\u003cp class=\"stk-block-text__text\"\u003eThis GitHub repo has a community of data enthusiasts who regularly contribute. The repo is a list of high quality public datasets sorted by topic, including data from agriculture, entertainment, sports, and more.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-33e1391\" id=\"2-a-href-https-github-com-buzz-feed-news-title-buzzfeed-a\" data-block-id=\"33e1391\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e2) \u003ca href=\"https://github.com/BuzzFeedNews\" title=\"\"\u003eBuzzfeed\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-f275c3e\" data-block-id=\"f275c3e\"\u003e\u003cp class=\"stk-block-text__text\"\u003eFor the sake of transparency, BuzzFeed provides the datasets that underlie some of their articles.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-57740d8\" id=\"3-a-href-https-data-gov-title-data-gov-a\" data-block-id=\"57740d8\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e3) \u003ca href=\"https://data.gov\" title=\"\"\u003eData.gov\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-46a5c74\" data-block-id=\"46a5c74\"\u003e\u003cp class=\"stk-block-text__text\"\u003e Data.gov provides over 280,000 datasets from various US government agencies at the federal, state, and city level. Keep an eye out for any licensing agreements on datasets, but you can find data relevant to a wide range of research interests.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-1f27902\" id=\"4-a-href-https-data-world-datasets-open-data-title-data-world-a\" data-block-id=\"1f27902\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e4) \u003ca href=\"https://data.world/datasets/open-data\" title=\"\"\u003eData.world\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-cc1fa42\" data-block-id=\"cc1fa42\"\u003e\u003cp class=\"stk-block-text__text\"\u003eData.world has nearly 130,000 open datasets. Many are years old, limiting their value in research, but if you need data to practice your data analysis skills, this is a great source to find possible data!\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-f64a8b5\" id=\"5-a-href-https-www-data-is-plural-com-title-data-is-plural-a\" data-block-id=\"f64a8b5\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e5) \u003ca href=\"https://www.data-is-plural.com\" title=\"\"\u003eData is Plural\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-f02c81d\" data-block-id=\"f02c81d\"\u003e\u003cp class=\"stk-block-text__text\"\u003eWhile this source might be harder to find a data set that fits an existing project, Data is Plural is a weekly newsletter that shares interesting datasets. Even more useful, the newsletter is archived, so you can look through all 350+ newsletters that have been compiled so far.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-b3c736e\" id=\"6-a-href-https-data-europa-eu-data-datasets-title-european-data-a\" data-block-id=\"b3c736e\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e6) \u003ca href=\"https://data.europa.eu/data/datasets\" title=\"\"\u003eEuropean Data\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-374dd4e\" data-block-id=\"374dd4e\"\u003e\u003cp class=\"stk-block-text__text\"\u003eThis source shares open data provided by the EU spanning a wide range of topics.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-6a51ef5\" id=\"7-a-href-https-datasetsearch-research-google-com-title-google-dataset-search-a\" data-block-id=\"6a51ef5\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e7) \u003ca href=\"https://datasetsearch.research.google.com\" title=\"\"\u003eGoogle Dataset Search\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-5e254f8\" data-block-id=\"5e254f8\"\u003e\u003cp class=\"stk-block-text__text\"\u003eThis search engine provided by Google is—in my opinion—your best bet for quickly finding open data relevant to a specific topic. You can use the search engine to search for data across thousands of repos. When I have a topic that I want to work with in my next data project, this is often the first tab I will open.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-d79b4c2\" id=\"8-a-href-https-research-google-resources-datasets-title-google-public-datasets-a\" data-block-id=\"d79b4c2\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e8) \u003ca href=\"https://research.google/resources/datasets/\" title=\"\"\u003eGoogle Public Datasets\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-89d8a60\" data-block-id=\"89d8a60\"\u003e\u003cp class=\"stk-block-text__text\"\u003eGoogle hosts a collection of datasets that you can query using BigQuery. With 1 TB of free querying each month, there are very few cases where these data wouldn\u0026#8217;t effectively be freely available.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-cc5627b\" id=\"9-a-href-https-www-kaggle-com-datasets-title-kaggle-a\" data-block-id=\"cc5627b\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e9) \u003ca href=\"https://www.kaggle.com/datasets\" title=\"\"\u003eKaggle\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cp\u003eKaggle is on virtually every list like this one because it is an online community made for data scientists. Kaggle allows users to upload and share their own data. Note that \u003cem\u003emany \u003c/em\u003erecent datasets uploaded to the site are generated with AI tools like ChatGPT and therefore not valid for many use cases.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-a8537ad\" id=\"10-a-href-https-www-mavenanalytics-io-data-playground-title-maven-analytics-a\" data-block-id=\"a8537ad\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e10) \u003ca href=\"https://www.mavenanalytics.io/data-playground\" title=\"\"\u003eMaven Analytics\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-8b1115d\" data-block-id=\"8b1115d\"\u003e\u003cp class=\"stk-block-text__text\"\u003eWith the goal of helping data enthusiasts apply and improve their data analysis and visualization skills, Maven Analytics provides real-world data for data enthusiasts to practice, learn, and develop with. Their data playground shares data hand-picked by instructors, and they host a monthly data challenge to help data enthusiasts practice and share their work!\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-5031162\" id=\"11-a-href-https-registry-opendata-aws-title-open-data-on-amazon-web-service-a\" data-block-id=\"5031162\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e11) \u003ca href=\"https://registry.opendata.aws\" title=\"\"\u003eOpen Data on Amazon Web Service\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-8e49a3c\" data-block-id=\"8e49a3c\"\u003e\u003cp class=\"stk-block-text__text\"\u003eThis site contains nearly 500 datasets available via AWS resources. And if you complete a project using one of the datasets, there\u0026#8217;s a chance that your work will be featured in an AWS blog post!\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-9888cbe\" id=\"11-a-href-https-www-reddit-com-r-datasets-title-r-datasets-a\" data-block-id=\"9888cbe\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003e11) \u003ca href=\"https://www.reddit.com/r/datasets/\" title=\"\"\u003er/Datasets\u003c/a\u003e\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-720ee1d\" data-block-id=\"720ee1d\"\u003e\u003cp class=\"stk-block-text__text\"\u003er/Datasets is one of my favorite data-related subreddits, because users can share datasets or post requests so other members can help share relevant datasets. Users can also share tools, resources, and code related to data.\u003c/p\u003e\u003c/div\u003e\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"children\":[[\"$\",\"$L13\",null,{\"activeTitle\":\"11 Sources to Find Free Public Datasets for Your Next Data Projects\"}],[\"$\",\"div\",null,{\"className\":\"mb-4 p-4 neobrutal bg-surface-container-lowest text-on-surface mb-12\",\"children\":[\"$\",\"div\",null,{\"className\":\"z-0\",\"children\":[\"$\",\"$L14\",null,{\"htmlContent\":\"$15\"}]}]}]]}]\n10:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"11 Sources to Find Free Public Datasets for Your Next Data Projects | Analytic Talesmith\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"Generated by create next app\"}],[\"$\",\"link\",\"4\",{\"rel\":\"icon\",\"href\":\"/favicon.ico\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}]]\n3:null\n"])</script></body></html>
