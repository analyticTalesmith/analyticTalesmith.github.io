7a959cfdff.js\",\"110\",\"static/chunks/110-840ec3b110f34719.js\",\"610\",\"static/chunks/app/(pages)/blog/%5Bslug%5D/page-09a69fa98d8e5d2d.js\"],\"default\"]\n15:T11f47,"])</script><script>self.__next_f.push([1,"\n\u003cdiv class=\"wp-block-stackable-subtitle stk-block-subtitle stk-block stk-e8b11f4\" data-block-id=\"e8b11f4\"\u003e\u003cp class=\"stk-block-subtitle__text stk-subtitle\"\u003e\u003cem\u003eExploratory data analysis of sourced employee performance and training data using Python and SQL\u003c/em\u003e\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eSummary\u003c/h3\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003eContext\u003c/strong\u003e\u0026nbsp;— Data set contains employee performance, whether key performance indicator (KPI) goals were met, number of trainings completed, and average training performance\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eProblem\u003c/strong\u003e\u0026nbsp;— Do trainings appear to improve employee performance?\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eImportance\u003c/strong\u003e\u0026nbsp;— Training is an expensive, time-consuming process, and trainings vary in the value they contribute\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eInsights and Next Steps\u003c/strong\u003e\u0026nbsp;—\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003e\u003cstrong\u003eFuture Data Recommendations\u003c/strong\u003e\u003c/em\u003e\u003cul\u003e\u003cli\u003e\u003cem\u003eIncrease scope of data collection\u003c/em\u003e — Having data on employee performance over the years and data about what trainings were completed by those employees each year could provide better insight into whether the trainings utilized by the organization are valuable and improving employee performance over time.\u003c/li\u003e\u003c/ul\u003e\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003eIdentify reasons for underperformance \u003c/em\u003e— Regions 9 and 24 appear to be underperforming compared to the rest of the organization. The organization could benefit from collecting more data, including talking to employees within those regions, to uncover what pain points could be resolved to help support better performance. Additionally, Sales \u0026amp; Marketing is specifically struggling to meet KPI goals across the organization; it could be beneficial to assess whether this is due to measure accuracy (e.g., being evaluated on metrics that are irrelevant to sales and marketing roles), insufficient training or access to resources, or some other cause.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003e\u003cem\u003ePractical Recommendations\u003c/em\u003e\u003c/strong\u003e\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003eValue quality over quantity\u003c/em\u003e\u0026nbsp;— Based on these data, employees within this organization who complete more trainings do not necessarily perform better. When providing trainings for the sake of improving performance, focus on providing high-quality training that targets employee weaknesses. Additionally, reward the behavior you want to see more of from your employees; reward high performance in those trainings to encourage learning and skill transfer.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003eEncourage high-quality referrals\u003c/em\u003e\u0026nbsp;— Employees who were recruited through referrals are considerably high performers. It could benefit the organization to encourage referrals long term.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003eConsider selection system objectivity\u003c/em\u003e\u0026nbsp;— Considerably more information would be needed to make any meaningful conclusions or recommendations, but there are more than twice as many men employed within this organization as women, which suggests potential value of evaluating recruiting strategies and selection systems used by the organization for fairness, objective qualification assessment, and potential sources of bias.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eLINKS TO PROJECT FILES\u003c/h3\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003ca href=\"https://github.com/analyticTalesmith/HREmployeePerformance/blob/main/employeePerformanceAnalysis.py\"\u003ePython Code\u003c/a\u003e\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003ca href=\"https://github.com/analyticTalesmith/HREmployeePerformance/blob/main/employeePerformanceSQL.sql\"\u003eSQL Queries\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003ch2 class=\"wp-block-heading\"\u003eINTRODUCTION\u003c/h2\u003e\n\n\n\n\u003cp class=\"\"\u003eThis dataset is sourced from\u0026nbsp;\u003ca href=\"https://www.kaggle.com/datasets/sanjanchaudhari/employees-performance-for-hr-analytics/data\"\u003eSanjana Chaudhari at kaggle.com\u003c/a\u003e. The data is organized within one table containing employee ID and demographics and details for each employee. The table contains performance metrics and information about the number of trainings each employee has completed and their average performance across trainings.\u003c/p\u003e\n\n\n\n\u003ch2 class=\"wp-block-heading\"\u003eASSUMPTIONS AND LIMITATIONS\u003c/h2\u003e\n\n\n\n\u003cp class=\"\"\u003eSome details about the data were not provided, and therefore some assumptions have been made.\u003c/p\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003ePerformance Scale Anchors\u003c/strong\u003e\u0026nbsp;— Scale anchors were not provided, though the coding ranges from 1 to 5. The assumption is that this is an ordinal Likert-type scale, such that employees are evaluated from 1 (\u003cem\u003eWorst performance\u003c/em\u003e) to 5 (\u003cem\u003eBest performance\u003c/em\u003e) or vice versa. To determine which pole was associated with either extreme of performance, I calculated Pearson correlation coefficients between performance and each of KPI goals met and average training score, both indicating that the scale is likely ordered with 1 being the lowest performance and 5 being the best performance\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eSequencing of Data Collection\u003c/strong\u003e\u0026nbsp;— The performance rating is named \u0026#8220;previous_year_rating\u0026#8221;, but the column names for other performance metrics do not make it immediately obvious whether the other data reflect the same year as the performance rating or if they reflect the year following the performance rating. For the sake of this case study, the metrics are all assumed to reflect performance over the same 12-month period.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eRating Objectivity\u003c/strong\u003e\u0026nbsp;— This type of analysis must assume that measured variables are reported using measures that are objective and valid. Should performance metrics reflect subjective ratings, factors regarded as KPIs not actually be relevant to employee and organizational performance, or training performance not reflect learning the material taught within the training, for example, then the insights that could be drawn from the data would be limited.\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003ch2 class=\"wp-block-heading\"\u003eCLEANING\u003c/h2\u003e\n\n\n\n\u003cp class=\"\"\u003eThe dataset is already fairly clean, so the only cleaning needed was some basic casting for the sake of convenience. The region was coded as a \u0026#8220;region_#\u0026#8221; string, so I used the following code to pull only the integer associated with each region.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"ALTER TABLE HRPerformance.dbo.EmployeeData\n\tADD\n\t\tregion_ID int\n\nUPDATE HRPerformance.dbo.EmployeeData\n\tSET region_ID =\n\t\tCAST(\n\t\t  SUBSTRING(region,CHARINDEX('_',region)+1,LEN(region)-CHARINDEX('_',region)+2)\n\t\t  AS int\n\t\t)\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eALTER\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eTABLE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eADD\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\tregion_ID \u003c/span\u003e\u003cspan style=\"color: #C792EA\"\u003eint\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eUPDATE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eSET\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e region_ID \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCAST\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t  \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eSUBSTRING\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(region,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCHARINDEX\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003e_\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e,region)\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e+\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eLEN\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(region)\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e-\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCHARINDEX\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003e_\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e,region)\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e+\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t  \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #C792EA\"\u003eint\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eAdditionally, due to my own oversight in defining column types, the performance rating was imported as a string, so the following query was used to cast either as int or null for missing values.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"ALTER TABLE HRPerformance.dbo.EmployeeData\n\tADD\n\t\tpast_performance int\n\t\nUPDATE HRPerformance.dbo.EmployeeData\n\tSET past_performance =\n\t\t(CASE\n\t\t\tWHEN previous_year_rating \u0026lt;\u0026gt; '' THEN CAST(previous_year_rating AS int)\n\t\t\tELSE NULL\n\t\tEND)\n\nALTER TABLE HRPerformance.dbo.EmployeeData\n\tDROP COLUMN previous_year_rating\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eALTER\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eTABLE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eADD\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\tpast_performance \u003c/span\u003e\u003cspan style=\"color: #C792EA\"\u003eint\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eUPDATE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eSET\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e past_performance \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t(\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eCASE\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eWHEN\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e previous_year_rating \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026lt;\u0026gt;\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eTHEN\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCAST\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(previous_year_rating \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #C792EA\"\u003eint\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eELSE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eNULL\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eEND\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eALTER\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eTABLE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eDROP\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e COLUMN previous_year_rating\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eFinally, 1,363 employees do not have performance ratings recorded. Their data were not removed from the dataset, however they were excluded in any analyses that involved the performance as a variable.\u003c/p\u003e\n\n\n\n\u003ch2 class=\"wp-block-heading\"\u003eEXPLORING DATA\u003c/h2\u003e\n\n\n\n\u003cp class=\"\"\u003eThough largely irrelevant to the final analyses, I wanted to first familiarize myself with the organizational structure to better understand the business context of the data and used the following queries to do so.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"--General insights into organizational composition\nSELECT\n\tdepartment,\n\tCOUNT(department) AS DptCount\n\tFROM HRPerformance.dbo.EmployeeData\n\tGROUP BY department\n\tORDER BY department\n\nSELECT\n\tgender,\n\tCOUNT(gender) AS GenderCount\n\tFROM HRPerformance.dbo.EmployeeData\n\tGROUP BY gender\n\nSELECT\n\teducation,\n\tCOUNT(education) AS EdCount\n\tFROM HRPerformance.dbo.EmployeeData\n\tWHERE education \u0026lt;\u0026gt; ''\n\tGROUP BY education\n\nSELECT\n\tregion,\n\tCOUNT(region) AS RegionCount\n\tFROM HRPerformance.dbo.EmployeeData\n\tGROUP BY region\n\n--High resolution breakdown of org structure\nSELECT\n\tregion_id,\n\tdepartment,\n\tgender,\n\tCOUNT(gender) AS TotalEmployees\n\tFROM HRPerformance.dbo.EmployeeData\n\tGROUP BY region_id, department, gender\n\tORDER BY region_id, department, gender\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e--General insights into organizational composition\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eS tyle=\"color: #82AAFF\"\u003eCOUNT\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(gender) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e TotalEmployees\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eGROUP BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e region_id, department, gender\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eORDER BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e region_id, department, gender\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003ePERFORMANCE AND KPI GOALS\u003c/h3\u003e\n\n\n\n\u003cp class=\"\"\u003eI also wanted to verify that performance was related to whether employees were meeting KPI goals.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(1 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"SELECT\n\tpast_performance,\n\tCOUNT(employee_id) AS  total_employees,\n\tROUND(cast(count(CASE WHEN KPIs_met = 1 THEN 1 END) AS float)/count(employee_ID), 2) AS percent_met_goal\n\tFROM HRPerformance.dbo.EmployeeData\n\tGROUP BY past_performance\n\tORDER BY past_performance\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eSELECT\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tpast_performance,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCOUNT\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(employee_id) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e  total_employees,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eROUND\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ecast\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ecount\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eCASE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eWHEN\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e KPIs_met \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eTHEN\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eEND\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003efloat\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e)\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e/\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ecount\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(employee_ID), \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e percent_met_goal\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eGROUP BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e past_performance\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eORDER BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e past_performance\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n[table id=1 /]\n\n\n\n\u003cp class=\"\"\u003eIt appears that performance does correlate strongly with KPI goals, providing support that the performance evaluations are indeed objectively measuring performance. The Pearson correlation coefficient—Python code shown below—indeed confirms that performance and meeting KPI goals are moderately correlated as expected,\u0026nbsp;\u003cem\u003er\u003c/em\u003e(16052) = .34,\u0026nbsp;\u003cem\u003ep\u003c/em\u003e\u0026nbsp;\u0026lt; .001.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"import pandas\nfrom scipy.stats import pearsonr\nfrom prettytable import PrettyTable\n\n\n#Helper function to format Pearson results; round r to 2 decimal places, and report p to 3 places (or \u0026lt;.001)\ndef clean_r_for_table(res):\n    output = ['','']\n    output[0] = round(res[0],2)\n    if res[1] \u0026gt;= .001:\n        output[1] = round(res[1],3)\n    elif res[1] \u0026lt; .001:\n        output[1] = \u0026quot;\u0026lt;.001\u0026quot;\n    return output\n\n#Create dataframe with column names and set up PrettyTable for easy printing\ncolNames = [\u0026quot;employee_id\u0026quot;, \u0026quot;department\u0026quot;, \u0026quot;region\u0026quot;, \u0026quot;education\u0026quot;, \u0026quot;gender\u0026quot;, \u0026quot;recruitment_channel\u0026quot;, \u0026quot;no_of_trainings\u0026quot;,\u0026quot;age\u0026quot;,\u0026quot;previous_year_rating\u0026quot;,\u0026quot;length_of_service\u0026quot;,\u0026quot;KPIs_met_more_than_80\u0026quot;,\u0026quot;awards_won\u0026quot;,\u0026quot;avg_training_score\u0026quot;]\ndf = pandas.read_csv(\u0026quot;employees_final_dataset.csv\u0026quot;, sep=',', header=0, names=colNames)\nout = PrettyTable(['X', 'Y', 'n', 'r', 'df', 'p'])\n\n#Calculate r with pairwise deletion of any rows missing data, and report correlation in table\n\n##Performance and KPI goals\ndf_cor = df.dropna(axis=0, subset = [\u0026quot;previous_year_rating\u0026quot;, \u0026quot;KPIs_met_more_than_80\u0026quot;]);\nr = clean_r_for_table(pearsonr(df_cor[\u0026quot;previous_year_rating\u0026quot;], df_cor[\u0026quot;KPIs_met_more_than_80\u0026quot;]))\nout.add_row([\u0026quot;Previous year rating\u0026quot;, \u0026quot;KPI Goals Met\u0026quot;, df_cor.shape[0], r[0], df_cor.shape[0]-2, r[1]])\n\nprint(\u0026quot;Correlations\u0026quot;)\nprint(out)\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12 FF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003edf_cor\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eprevious_year_rating\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e df_cor\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eKPIs_met_more_than_80\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e]))\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003eout\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eadd_row\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e([\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003ePrevious year rating\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eKPI Goals Met\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e df_cor\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #F07178\"\u003eshape\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e r\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e df_cor\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #F07178\"\u003eshape\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e]-\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e r\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e]])\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003eprint\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eCorrelations\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003eprint\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eout\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eTRAINING EFFICACY\u003c/h3\u003e\n\n\n\n\u003cp class=\"\"\u003eUsing similar queries and functions as above, I also explored the relationship between training metrics (number of trainings and average performance across trainings) with performance evaluations and KPI goals.\u003c/p\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\"\u003eNUMBER OF TRAININGS\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eI first aggregated average performance ratings and what percentage of employees met KPI goals over the number of trainings they completed. There appears to be a generally negative trend in both performance evaluations and meeting KPI goals up until 8 and 9 trainings. However, the total number of employees completing a certain number of trainings rapidly decreases as the number of trainings increases, so conclusions must be made with this limitation in mind. Indeed, though analyses indicated some statistically significant effects, as discussed below, the number of trainings employees completed is largely\u0026nbsp;\u003cem\u003epractically\u003c/em\u003e\u0026nbsp;unrelated to employee performance.\u003c/p\u003e\n\n\n\n[table id=2 /]\n\n\n\n\u003cp class=\"\"\u003eTable generated using following, with the second query used to verify accuracy of table indicating that no employees who completed 6 trainings met KPI goals:\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"SELECT\n\tno_of_trainings,\n\tCOUNT(employee_id) AS  total_employees,\n\tround(avg(cast(past_performance AS float)), 2) AS avg_performance,\n\tROUND(cast(count(CASE WHEN KPIs_met = 1 THEN 1 END) AS float)/count(employee_ID), 2) AS percent_met_goal\n\tFROM HRPerformance.dbo.EmployeeData\n\tGROUP BY no_of_trainings\n\tORDER BY no_of_trainings\n\n--Verifying that no 6-training employees met KPIs\nSELECT\n\temployee_id,\n\tpast_performance,\n\tno_of_trainings,\n\tKPIs_met\n\tFROM HRPerformance.dbo.EmployeeData\n\tWHERE no_of_trainings = 6\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eSELECT\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tno_of_trainings,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCOUNT\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(employee_id) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e  total_employees,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003 F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eEND\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003efloat\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e)\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e/\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ecount\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(employee_ID), \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e percent_met_goal\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eGROUP BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e no_of_trainings\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eORDER BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e no_of_trainings\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e--Verifying that no 6-training employees met KPIs\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eSELECT\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\temployee_id,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tpast_performance,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tno_of_trainings,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tKPIs_met\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eWHERE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e no_of_trainings \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e6\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eThough Pearson correlation coefficient indicated that number of trainings is statistically significantly negatively correlated with performance evaluations (\u003cem\u003er\u003c/em\u003e(16052) = -.05,\u0026nbsp;\u003cem\u003ep\u003c/em\u003e\u0026nbsp;\u0026lt; .001) and meeting KPI goals (\u003cem\u003er\u003c/em\u003e(17415) = -.05,\u0026nbsp;\u003cem\u003ep\u003c/em\u003e\u0026nbsp;\u0026lt; .001), the practical significance of these correlations is marginal at best. A one-way analysis of variance indicates that there\u0026nbsp;\u003cem\u003eare\u003c/em\u003e\u0026nbsp;significant differences in average performance,\u0026nbsp;\u003cem\u003eF\u003c/em\u003e(8, 16045) = 7.03,\u0026nbsp;\u003cem\u003ep\u003c/em\u003e\u0026nbsp;\u0026lt; .001, and whether KPI goals are met,\u0026nbsp;\u003cem\u003eF\u003c/em\u003e(8, 16045) = 5.45,\u0026nbsp;\u003cem\u003ep\u003c/em\u003e\u0026nbsp;\u0026lt; .001, based on how many trainings employees complete. However, post hoc Tukey\u0026#8217;s HSD analyses indicate that employees who completed 1 training had significantly better performance evaluations than those who completed 2-4 trainings, and that those who completed 2 trainings had better performance evaluations than those who completed 4 trainings. Otherwise, there are no statistical differences in average performance between groups based on number of trainings completed. Regarding meeting KPI goals, the only differences were that more people who completed only 1 training met KPI goals than those who completed 2 or 4 trainings. Code similar that shown before was used to calculate correlation coefficients, and the following code is an example of the Python code used to perform analyses of variance and post hoc Tukey\u0026#8217;s HSDs:\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(1 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"df_tukey = df.dropna(axis=0, subset= [\u0026quot;previous_year_rating\u0026quot;, \u0026quot;no_of_trainings\u0026quot;])\nmodel = ols('previous_year_rating ~ C(no_of_trainings)', data=df_tukey).fit()\nprint(\u0026quot;\\n\\n Mean comparison of performance evaluation by no. of trainings\u0026quot;)\nprint(sm.stats.anova_lm(model, typ=2))\n\ntukey = pairwise_tukeyhsd(endog = df_tukey['previous_year_rating'],\n                          groups = df_tukey['no_of_trainings'],\n                          alpha = 0.05)\nprint(tukey)\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003edf_tukey \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e df\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003edropna\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003eaxis\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003esubset\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eprevious_year_rating\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eno_of_trainings\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e])\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003emodel \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eols\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eprevious_year_rating ~ C(no_of_trainings)\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003edata\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003edf_tukey\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e).\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003efit\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e()\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003eprint\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\\n\\n\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003e Mean comparison of performance evaluation by no. of trainings\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003eprint\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003esm\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #F07178\"\u003estats\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eanova_lm\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003emodel\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003etyp\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e))\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003etukey \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003epairwise_tukeyhsd\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003eendog\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e df_tukey\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eprevious_year_rating\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003e                          \u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003egroups\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e df_tukey\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eno_of_trainings\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003e                          \u003c/span\u003e\u003cspan style=\"color: #EEFFFF; font-style: italic\"\u003ealpha\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0.05\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #82AAFF\"\u003eprint\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003etukey\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003ch5 class=\"wp-block-heading\"\u003e\u0026#8220;SUPER-TRAINEES\u0026#8221;\u003c/h5\u003e\n\n\n\n\u003cp class=\"\"\u003eAn additional query was used to pull information to determine what types of employees are taking these potentially-excessive trainings to help identify possible problems. Based on the results, I would suggest that regions 2, 7, and 22 evaluate if employees might be over-training, especially within the Sales \u0026amp; Marketing and Procurement departments.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"--Further exploring these \u0026quot;super-trainees\u0026quot;\nSELECT\n\tno_of_trainings,\n\tpast_performance,\n\tKPIs_met,\n\tlength_of_service,\n\tdepartment,\n\tregion_ID\n\tFROM HRPerformance.dbo.EmployeeData\n\tWHERE no_of_trainings \u0026gt;= 5\n\tORDER BY no_of_trainings DESC, department, region_ID\n\n--Summarize \u0026quot;super-trainee\u0026quot; query\nSELECT\n\tregion_ID,\n\tdepartment,\n\tCOUNT(employee_id) AS total_trainees\n\tFROM HRPerformance.dbo.EmployeeData\n\tWHERE no_of_trainings \u0026gt;= 5\n\tGROUP BY department, region_ID\n\tORDER BY region_ID, department, COUNT(employee_id) DESC\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e--Further exploring these \u0026quot;super-trainees\u0026quot;\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eSELECT\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tno_of_trainings,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tpast_performance,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tKPIs_met,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tlength_of_service,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tdepartment,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tregion_ID\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eWHERE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e no_of_trainings \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026gt;=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e5\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eORDER BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e no_of_trainings \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eDESC\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e, department, region_ID\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e--Summarize \u0026quot;super-trainee\u0026quot; query\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #F78C6C\"\u003eSELECT\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tregion_ID,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\tdepartment,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCOUNT\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(employee_id) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e total_trainees\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e HRPerformance.dbo.EmployeeData\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eWHERE\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e no_of_trainings \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026gt;=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e5\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eGROUP BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e department, region_ID\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e\t\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eORDER BY\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e region_ID, department, \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eCOUNT\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e(employee_id) \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003eDESC\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\"\u003ePERFORMANCE ACROSS TRAININGS\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eAdditionally, I wanted to assess whether employees\u0026#8217; average performance across trainings was related to performance outcomes. Because the average training score appears to be rated on a 0-100 scale, I utilized the following query to conveniently bucket employees based on training performance, grouped in 10-point intervals\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"WITH training_data AS (\n\tSELECT\n\t\temployee_id,\n\t\t(CASE\tWHEN avg_training_score \u0026lt; 40 THEN '[0,40)'\n\t\t\tWHEN avg_training_score \u0026lt; 50 THEN '[40,50)'\n\t\t\tWHEN avg_training_score \u0026lt;60 THEN '[50,60)'\n\t\t\tWHEN avg_training_score \u0026lt;70 THEN '[60,70)'\n\t\t\tWHEN avg_training_score \u0026lt;80 THEN '[70,80)'\n\t\t\tWHEN avg_training_score \u0026lt;90 THEN '[80,90)'\n\t\t\tWHEN avg_training_score \u0026lt;=100 THEN '[90,100]'\n\t\t\tELSE 'EXCEPTION: Invalid score'\n\t\tEND) AS training_performance,\n\t\tKPIs_met,\n\t\tpast_performance,\n\t\tno_of_trainings\n\t\tFROM HRPerformance.dbo.EmployeeData\n\t\tWHERE past_performance IS NOT NULL\n\t)\nSELECT\n\ttraining_performance,\n\tCOUNT(training_performance) AS n,\n\tround(AVG(CAST(no_of_trainings AS float)), 2) AS avg_no_training,\n\tround(AVG(CAST(past_performance AS float)), 2) AS avg_performance,\n\tround(CAST(SUM(KPIs_met) AS  float)/COUNT(employee_id), 4)*100 AS percent_KPIs_met\n\tFROM training_data\n\tGROUP BY training_performance\n\tORDER BY training_performance\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\
