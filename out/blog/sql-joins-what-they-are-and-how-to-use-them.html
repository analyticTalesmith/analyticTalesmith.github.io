ne\",\"d\":\"M0 0h24v24H0z\",\"fill\":\"none\"}],[\"$\",\"path\",null,{\"d\":\"M4 4m0 2a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2z\"}],[\"$\",\"path\",null,{\"d\":\"M8 11l0 5\"}],[\"$\",\"path\",null,{\"d\":\"M8 8l0 .01\"}],[\"$\",\"path\",null,{\"d\":\"M12 16l0 -5\"}],[\"$\",\"path\",null,{\"d\":\"M16 16v-3a2 2 0 0 0 -4 0\"}]]}]]}]]}],[\"$\",\"p\",null,{\"className\":\"mt-8 text-base leading-6 text-center text-gray-400\",\"children\":\"© 2024 Jonathan Bailey. All rights reserved.\"}]]}]}]]}]]}]}],null],null],\"couldBeIntercepted\":false,\"initialHead\":[false,\"$L10\"],\"globalErrorComponent\":\"$11\",\"missingSlots\":\"$W12\"}]]\n"])</script><script>self.__next_f.push([1,"13:I[2478,[\"231\",\"static/chunks/231-51948d2fc13689f8.js\",\"173\",\"static/chunks/173-eff3ff7a959cfdff.js\",\"110\",\"static/chunks/110-840ec3b110f34719.js\",\"610\",\"static/chunks/app/(pages)/blog/%5Bslug%5D/page-09a69fa98d8e5d2d.js\"],\"default\"]\n14:I[1117,[\"231\",\"static/chunks/231-51948d2fc13689f8.js\",\"173\",\"static/chunks/173-eff3ff7a959cfdff.js\",\"110\",\"static/chunks/110-840ec3b110f34719.js\",\"610\",\"static/chunks/app/(pages)/blog/%5Bslug%5D/page-09a69fa98d8e5d2d.js\"],\"default\"]\n15:T7058,"])</script><script>self.__next_f.push([1,"\n\u003cp class=\"\"\u003eYou have multiple tables of related data, and you need to quickly access them both. You \u003cem\u003ecould \u003c/em\u003etry to use the tables separately, or you might go into Notepad or Excel to join them manually. But how can you speed up the process of joining the data? Well, conveniently, SQL has a set of functions called \u0026#8220;joins\u0026#8221; that can do exactly what they say: join data from multiple tables. So what exactly are joins, how do they work, and what types of joins are available to you?\u003c/p\u003e\n\n\n\n\u003c!--more--\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-f4bc9fb\" id=\"introduction-to-sql-joins\" data-block-id=\"f4bc9fb\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eIntroduction to SQL Joins\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-8e2ad02\" data-block-id=\"8e2ad02\"\u003e\u003cp class=\"stk-block-text__text\"\u003eA SQL join clause looks through two tables and combines similar rows based on the join condition you provide, returning the combined rows in one table for you to use in your queries. This condition will generally tell SQL what specific key (usually a primary key in one table that is present as a foreign key in another table) should be used to match rows across tables. Joins are like a matchmaking process for your tables, and you can use multiple joins to combine more than 2 tables.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-8bec64d\" data-block-id=\"8bec64d\"\u003e\u003cp class=\"stk-block-text__text\"\u003eIt is important to note that joins will return the subset of the cartesian product of the original tables that meet the conditions you specify in your query. That is, given table A with \u003cem\u003en \u003c/em\u003erows and table B with \u003cem\u003em \u003c/em\u003erows, a join will return at most \u003cem\u003en\u003c/em\u003e*\u003cem\u003em \u003c/em\u003erows. The subset will only reach this max length if your join condition is True for\u003cem\u003e all\u003c/em\u003e pairs of rows. The dataset returned by your join will contain a row for each instance where the join condition was True (or in the case of outer joins, for each row that could not be matched).\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-cbc7268\" data-block-id=\"cbc7268\"\u003e\u003cp class=\"stk-block-text__text\"\u003eWhy does this technically matter? It is entirely possible for the returned dataset from your join to be longer than either original table. Say we have one table of 3 customer IDs and another of 15 purchases. If instead of joining based on customer ID, I accidentally passed my join condition as \u0026#8220;1 = 1\u0026#8221; (i.e., always True), then the resulting dataset will contain 45 rows, one row for each purchase joined with each customer (the exact same dataset you would get if you used a cross join without a where clause).\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-558a276\" id=\"types-of-joins\" data-block-id=\"558a276\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eTypes of Joins\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-511c764\" id=\"inner-join\" data-block-id=\"511c764\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eInner Join\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-image stk-block-image stk-block stk-42efae6\" id=\"inner-join\" data-block-id=\"42efae6\"\u003e\u003cstyle\u003e.stk-42efae6 .stk-img-wrapper{width:100% !important;height:469px !important}.stk-42efae6 .stk-img-wrapper img{object-fit:contain !important}@media screen and (max-width:767px){.stk-42efae6 .stk-img-wrapper{height:176px !important}}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1337\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/innerJoinCrop.svg\" width=\"100\" height=\"469\" alt=\"Venn diagram demonstrating that an inner join will only select rows that are in both tables\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"SELECT *\n  FROM TableA AS A\n  INNER JOIN TableB AS B\n    ON A.Key = B.Key\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eSELECT\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e*\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableA \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eINNER JOIN\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableB \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eON\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A.Key \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B.Key\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"has-d-8-dee-9-ff-color has-text-color\" id=\"inner-join\"\u003eInner joins return all joined rows where the key in B matches the key in A. Inner joins are the default join type in SQL. You \u003cem\u003ecould \u003c/em\u003ejust use join in your query and the results would be the same as using an inner join. But for the sake of clarity, I would personally stick to explicitly using \u0026#8220;inner join\u0026#8221; to reduce any uncertainty or ambiguity when someone is reading/reviewing your query.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-4f6c7f7\" id=\"left-and-right-outer-joins\" data-block-id=\"4f6c7f7\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eLeft and Right Outer Joins\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-image stk-block-image stk-block stk-bb7b3d4\" data-block-id=\"bb7b3d4\"\u003e\u003cstyle\u003e.stk-bb7b3d4 .stk-img-wrapper{width:100% !important;height:469px !important}.stk-bb7b3d4 .stk-img-wrapper img{object-fit:contain !important}@media screen and (max-width:767px){.stk-bb7b3d4 .stk-img-wrapper{height:176px !important}}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1338\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/leftJoinCrop.svg\" width=\"100\" height=\"469\"  stk-block stk-860910a\" id=\"full-outer-join\" data-block-id=\"860910a\"\u003e\u003cstyle\u003e.stk-860910a .stk-img-wrapper{width:100% !important;height:469px !important}.stk-860910a .stk-img-wrapper img{object-fit:contain !important}@media screen and (max-width:767px){.stk-860910a .stk-img-wrapper{height:176px !important}}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1335\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/fullOuterJoinCrop.svg\" width=\"100\" height=\"469\" alt=\"Venn diagram demonstrating that an inner join will only select rows that are in both tables\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"SELECT *\n  FROM TableA AS A\n  FULL OUTER JOIN TableB AS B\n    ON A.Key = B.Key\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eSELECT\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e*\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableA \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eFULL OUTER JOIN\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableB \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eON\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A.Key \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B.Key\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"has-d-8-dee-9-ff-color has-text-color\" id=\"full-outer-join\"\u003eA full outer join will return all rows from tables A and B, with rows containing info from both tables when they can be matched based on your join condition.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-c4fca74\" id=\"full-outer-join-excluding-inner-join\" data-block-id=\"c4fca74\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eFull Outer Join Excluding Inner Join\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-image stk-block-image stk-block stk-114ef8f\" id=\"full-outer-join-excluding-inner-join\" data-block-id=\"114ef8f\"\u003e\u003cstyle\u003e.stk-114ef8f .stk-img-wrapper{width:100% !important;height:469px !important}.stk-114ef8f .stk-img-wrapper img{object-fit:contain !important}@media screen and (max-width:767px){.stk-114ef8f .stk-img-wrapper{height:176px !important}}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1336\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/fullOuterJoinExcludingInnerCrop.svg\" width=\"100\" height=\"469\" alt=\"Venn diagram demonstrating that an inner join will only select rows that are in both tables\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"SELECT *\n  FROM TableA AS A\n  FULL OUTER JOIN TableB AS B\n    ON A.Key = B.Key\n    WHERE A.Key IS NULL OR B.Key IS NULL\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eSELECT\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e*\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableA \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eFULL OUTER JOIN\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableB \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eON\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A.Key \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B.Key\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eWHERE\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A.Key \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eIS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eNULL\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eOR\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B.Key \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eIS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eNULL\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"has-d-8-dee-9-ff-color has-text-color\" id=\"full-outer-join-excluding-inner-join\"\u003eSimilar to the partial outer joins, you can specify a where clause in your full outer joins to return all rows that are either in table A or B, excluding rows that can be matched based on your join condition.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-d5b3592\" id=\"cross-join\" data-block-id=\"d5b3592\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eCross Join\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"SELECT *\n  FROM TableA AS A\n  CROSS JOIN TableB AS B\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eSELECT\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e*\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eFROM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableA \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e A\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e  \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eCROSS JOIN\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e TableB \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eAS\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e B\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eIf you want to return all rows in A matched with all rows in B, then cross join will return the full cartesian product of your two tables, just like an inner join where your join condition is always True.\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"flex-col\",\"children\":[[\"$\",\"$L13\",null,{\"activeTitle\":\"SQL Joins: What They Are and How To Use Them\"}],[\"$\",\"article\",null,{\"className\":\"flex flex-
