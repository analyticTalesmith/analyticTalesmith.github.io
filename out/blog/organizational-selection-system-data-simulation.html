ortant}}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch stk--has-lightbox\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1198\" src=\"http://analytictalesmith.com/wp-content/uploads/2023/11/selectionDbDiagram.png\" width=\"785\" height=\"363\" alt=\"SQL Database diagram\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003eContext\u003c/strong\u003e\u0026nbsp;— Because I could not find data relevant to the niche, I wanted to simulate data relevant to the information stakeholders might want regarding an organization\u0026#8217;s selection system efficiency\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eProblem\u003c/strong\u003e\u0026nbsp;— Generally, how to quickly produce data that emulate some factors that would be present in real-world data related to an organization\u0026#8217;s personnel selection processes\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eImportance\u003c/strong\u003e\u0026nbsp;— Working with larger data sets, especially those that have statistical characteristics you would expect to find in the real world enables better practice and identification of potential skill development opportunities\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eResult\u003c/strong\u003e\u0026nbsp;— Within 3 seconds, produces a dataset including record of about 2,030 job openings within the organization in the past year, about 17,000 records of expenses associated with filling those openings, and records of about 42,500 individuals who have applied to the roles\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eLinks to Project Files\u003c/h3\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003ca href=\"https://github.com/analyticTalesmith/SelectionDataSimulation/blob/main/SelectionDataSimulation.py\"\u003ePython Code\u003c/a\u003e\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003ca href=\"https://github.com/analyticTalesmith/SelectionDataSimulation/tree/main/generatedData\"\u003eGenerated CSVs\u003c/a\u003e\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eProject Overview\u003c/h3\u003e\n\n\n\n\u003cp class=\"\"\u003eI wanted to practice working with large data sets that had multiple tables of related data. However, many of the data sets I could find with those characteristics were generally unrelated to my areas of interest. I specifically wanted to practice using large, relational data sets in Tableau, so given that context, I decided to save time by using Python to simulate the data I wanted instead of hunting for the perfect data set that might not exist.\u003c/p\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eAlgorithm Summary\u003c/h3\u003e\n\n\n\n\u003cp class=\"\"\u003eThe logic behind the simulated data is quite simple. First, some constants are defined to specific some characteristics of the data and \u0026#8220;the organization\u0026#8221;. Constants are used to define how many roles there are within each department, how many branches comprise the organization, and the baseline mean and standard deviation of how long it takes to fill roles. Each branch and department also has an \u0026#8220;efficiency\u0026#8221; modifier either hard-coded or randomly chosen.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eGiven this information, the code randomly determines how many positions are currently open at each branch, if any, and then chooses which department that opening is in. The code generates historical data of roles that have been filled within the specified time range. For each opening, the code picks how long the role is/was unfilled from a normal distribution with a standard deviation of 1 week and a mean 4 weeks scaled by the modifier of both the branch and the department the opening is in.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eFor each opening, the code generates data for a bounded random number of people who applied to the job, including information about what stage they made it to within the selection system (e.g., fees for assessments or travel assistance for on-site visits/interviews) and what recruitment channel they were sourced from (e.g., job boards or internal referrals). Each opening has expenses associated with posting recruitment material on job boards, and also has expenses related to which stages of the selection system talent made it to and related to employees receiving referral bonuses if a referred candidate was hired.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eOnce these data are generated, the lists are converted into data frames, sorted and cleaned if needed, and then saved as three distinct CSVs ready to be used in practice projects.\u003c/p\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eCode Overview\u003c/h3\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\"\u003eConstants\u003c/h4\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-start:123;--cbp-line-number-width:calc(3 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"#Constants\nFILLED_JOBS_PER_DEPARTMENT  = 200\nRANGE_OF_DATA_YRS           = 1\nBRANCH_EFFICIENCY_SD        = .3\nMEAN_ROLL_FILL              = 28\nSD_ROLL_FILL                = 7\nBRANCHES                    = generate_branches(10)\nDEPARTMENTS                 = [['Human Resources', 0.2],\n                               ['Finance and Accounting', 0],\n                               ['Marketing', 0.15],\n                               ['Sales', 0.1],\n                               ['Information Technology', -0.1],\n                               ['Customer Service and Support', -0.3]]\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e#Constants\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003eFILLED_JOBS_PER_DEPARTMENT  \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e200\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003eRANGE_OF_DATA_YRS           \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003eBRANCH_EFFICIENCY_SD ],\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e                               \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eInformation Technology\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e-\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0.1\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e                               \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003eCustomer Service and Support\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e-\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0.3\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e]]\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eThe program is designed with constants in mind to make manipulating the statistical characteristics of the generated data set more rapid and accessible. The code uses constants to store how many filled jobs should be in the data set and how many years the data should span. It also has constants to define the standard deviation of the \u0026#8220;branch efficiency\u0026#8221; weights, and also has constants to define the mean and standard deviation of the normal distribution of how long it took to fill each role. Finally, the code uses lists of all branches within the organization and all departments within the organization, comprised of the name/identifier of each as well as the efficiency modifier associated with each.\u003c/p\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\"\u003eGenerating Branches\u003c/h4\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-start:39;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"def generate_branches(total: int):\n    \u0026quot;\u0026quot;\u0026quot;Return list of lists, each leaf containing a character ID for the branch and a scaling float for \u0026quot;efficiency\u0026quot;\n    \n    Args:\n        total (int): The number of branches.\n    \u0026quot;\u0026quot;\u0026quot;\n    chars = quick_char_list(total)\n    branchList = []\n    for i in range(len(chars)):\n        branchList.append([chars[i], round(np.random.normal(0, BRANCH_EFFICIENCY_SD), 2)])\n    return(branchList)\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"w s\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e[\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ei\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e],\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e round\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003enp\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #F07178\"\u003erandom\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003enormal\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e BRANCH_EFFICIENCY_SD\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e),\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)])\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003ereturn\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003ebranchList\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eThe Python function for generating the branches uses a helper function to generate a list of de-identified IDs for each branch, and then randomly assigns a branch modifier (\u003cem\u003eM \u003c/em\u003e= 0, \u003cem\u003eSD\u003c/em\u003e defined by the branch efficiency SD constant) and returns the list.\u003c/p\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\"\u003eUnique IDs\u003c/h4\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-start:29;--cbp-line-number-width:calc(2 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"def new_uuid() -\u0026gt; str:\n    \u0026quot;\u0026quot;\u0026quot;Generate a unique ID and return as string\u0026quot;\u0026quot;\u0026quot;\n    r_uuid = str(base64.urlsafe_b64encode(uuid.uuid4().bytes))[2:-1]\n    return r_uuid.replace('=', '')\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #C792EA\"\u003edef\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003enew_uuid\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e()\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e-\u0026gt;\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #FFCB6B\"\u003estr\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e:\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003e\u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003eGenerate a unique ID and return as string\u003c/span\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003e\u0026quot;\u0026quot;\u0026quot;\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    r_uuid \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #FFCB6B\"\u003estr\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ebase64\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eurlsafe_b64encode\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003euuid\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003euuid4\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e().\u003c/span\u003e\u003cspan style=\"color: #F07178\"\u003ebytes\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e))[\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e2\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e:-\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e]\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003ereturn\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e r_uuid\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003ereplace\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #C3E88D\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e\u0026#39;\u0026#39;\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eThis new_uuid function is the core of primary key generation for the relational data. Using the UUID library, the function generates a universally unique identifier, converts it to a string, and then cleans the string for convenient use.\u003c/p\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\"\u003eSimulating Data\u003c/h3\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro cbp-has-line-numbers cbp-highlight-hover\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;--cbp-line-number-color:#EEFFFF;--cbp-line-number-start:143;--cbp-line-number-width:calc(3 * 0.6 * .875rem);--cbp-line-highlight-color:rgba(238, 255, 255, 0.2);line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"#Simulation\n#Loop through each branch and randomly determine how many open positions there are.\n#Then randomly choose a department within the branch and generate data, including random number of applicants.\nfor brn in BRANCHES:\n\n    #Determine number of currently open positions in the branch\n    ctCurOpen = max(0, random.randint(1,10) - 3)\n    for i in range(0,ctCurOpen):\n        dpt = DEPARTMENTS[random.randint(0,len(DEPARTMENTS) - 1)]\n        tempOpening = generate_unfilled_opening(brn, dpt)\n        expenses.append(generate_expense_jobBoard(tempOpening))\n        openings.append(tempOpening)\n\n        #generate active employees currently in the selection pipeline for the role and related expenses\n        for i in range(0, random.randint(0,50)):\n            tempTalent = generate_active_talent(tempOpening)\n            if tempTalent[3] == 'KSAO Assessment':\n                expenses.append(generate_expense_assessment(tempOpening))\n            elif tempTalent[3] == 'Onsite':\n                expenses.append(generate_expense_assessment(tempOpening))\n                expenses.append(generate_expense_onsite_travel(tempOpening))\n            talent.append(tempTalent)\n\n    #Generate historical data for roles that have been filled, based on defined constant\n    for i in range(0, FILLED_JOBS_PER_BRANCH):\n        dpt = DEPARTMENTS[random.randint(0,len(DEPARTMENTS) - 1)]\n        filledJob = generate_filled_opening(brn,dpt)\n        openings.append(filledJob)\n        expenses.append(generate_expense_jobBoard(filledJob))\n        expenses.append(generate_expense_assessment(filledJob))\n        tempEmployee = generate_current_employee(filledJob)\n        talent.append(tempEmployee)\n        if tempEmployee[0] == \u0026quot;Referral\u0026quot;:\n            expenses.append(generate_expense_referral(filledJob))\n\n        #generate employees who didn't get selected\n        for i in range(0, random.randint(10,30)):\n            tempTalent = generate_rejected_talent(filledJob)\n            if tempTalent[3] == 'KSAO Assessment':\n                expenses.append(generate_expense_assessment(filledJob))\n            elif tempTalent[3] == 'Onsite' or tempTalent[3] == 'Offer and Negotiation':\n                expenses.append(generate_expense_assessment(filledJob))\n                expenses.append(generate_expense_onsite_travel(filledJob))\n                \n            talent.append(tempTalent)\n\" style=\"color:#EEFFFF;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki material-theme-darker\" style=\"background-color: #212121\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e#Simulation\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e#Loop through each branch and randomly determine how many open positions there are.\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e#Then randomly choose a department within the branch and generate data, including random number of applicants.\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003efor\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e brn \u003c/span\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003ein\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e BRANCHES\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e:\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #545454; font-style: italic\"\u003e#Determine number of currently open positions in the branch\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    ctCurOpen \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e=\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003emax\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e0\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e random\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003erandint\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e10\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e-\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #F78C6C\"\u003e3\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #89DDFF; font-style: italic\"\u003efor\u003c/span\u003e\u003cspan style=\"color: #EEFFFF\"\ FFFF\"\u003e                expenses\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eappend\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003egenerate_expense_onsite_travel\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003efilledJob\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e))\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e                \u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #EEFFFF\"\u003e            talent\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e.\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003eappend\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #82AAFF\"\u003etempTalent\u003c/span\u003e\u003cspan style=\"color: #89DDFF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eThe Python code above is the main loop of the data simulation. It loops through the branches that were generated, picking a random number of open positions for each branch to currently have (scaled to pick one from [0, 0, 0, 1, 2, 3, 4, 5, 6, 7] in line 149).   It then picks a random department for each open roll to be in, and then calls functions (lines 152 \u0026#8211; 154) to generate the simulated opening and recruitment/selection expenses data. Then, in line 157, the code similarly picks a random number of people who have applied to the position in a linear distribution from [0, 50]. It generates data on the applicant, including what stage they are currently at in the selection system pipeline. Using that stage data, it then generates additional expense data related to knowledge, skill, ability, and other characteristic (KSAO) assessment and onsite interview travel expense assistance.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eStarting at line 167, the code similarly generates data for roles that have been filled (defined by the filled jobs constant). It picks a random department within the branch, then generates the data regarding the opening, the expenses (including expenses related to talent moving through various stages of the selection system), the talent who was hired, and the talent who applied but were not hired.\u003c/p\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\"\u003eCleaning and Storing the Data\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eThe program ultimately converts the propagated lists into pandas data frames with named columns, sorts the data chronologically, cleans helper columns (e.g., the date the data point was generated) from the data frame, and then saves the data frames into three separate CSVs to be imported into business intelligence tools like Tableau or Excel for exploratory data analysis and data visualization.\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"flex-col\",\"children\":[[\"$\",\"$L13\",null,{\"activeTitle\":\"Organizational Selection System Data Simulation\"}],[\"$\",\"article\",null,{\"className\":\"flex flex-col grow max-w-7xl py-10 space-y-12\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"flex grow font-bold leading-tight text-4xl md:text-5xl\",\"children\":\"Organizational Selection System Data Simulation\"}],[\"$\",\"div\",null,{\"className\":\"mt-12 mb-4 p-4 w-full  neobrutal bg-surface-container-lowest text-on-surface mb-12\",\"children\":[\"$\",\"$L14\",null,{\"htmlContent\":\"$15\"}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\"
