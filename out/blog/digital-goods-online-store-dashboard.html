\" class=\"stk-img wp-image-1280\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/digitalSalesDash.png\" width=\"1920\" height=\"1080\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-button-group stk-block-button-group stk-block stk-375efa8\" data-block-id=\"375efa8\"\u003e\u003cdiv class=\"stk-row stk-inner-blocks stk-block-content stk-button-group\"\u003e\n\u003cdiv class=\"wp-block-stackable-button stk-block-button stk-block stk-35e34cf\" data-block-id=\"35e34cf\"\u003e\u003cstyle\u003e.stk-35e34cf,.stk-35e34cf .stk-button{width:100% !important}.stk-35e34cf{flex:1 1 0 !important}\u003c/style\u003e\u003ca class=\"stk-link stk-button stk--hover-effect-darken\" href=\"https://public.tableau.com/app/profile/jonathan.bailey/viz/DigitalDownloadShopPerformance/DigitalDownloadShopPerformance\" title=\"Digital Goods Online Store Dashboard\" target=\"_blank\" rel=\"noreferrer noopener\"\u003e\u003cspan class=\"stk--svg-wrapper\"\u003e\u003cdiv class=\"stk--inner-svg\"\u003e\u003csvg aria-hidden=\"true\" focusable=\"false\" data-prefix=\"fas\" data-icon=\"chart-line\" class=\"svg-inline--fa fa-chart-line fa-w-16\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 512 512\" width=\"32\" height=\"32\"\u003e\u003cpath fill=\"currentColor\" d=\"M496 384H64V80c0-8.84-7.16-16-16-16H16C7.16 64 0 71.16 0 80v336c0 17.67 14.33 32 32 32h464c8.84 0 16-7.16 16-16v-32c0-8.84-7.16-16-16-16zM464 96H345.94c-21.38 0-32.09 25.85-16.97 40.97l32.4 32.4L288 242.75l-73.37-73.37c-12.5-12.5-32.76-12.5-45.25 0l-68.69 68.69c-6.25 6.25-6.25 16.38 0 22.63l22.62 22.62c6.25 6.25 16.38 6.25 22.63 0L192 237.25l73.37 73.37c12.5 12.5 32.76 12.5 45.25 0l96-96 32.4 32.4c15.12 15.12 40.97 4.41 40.97-16.97V112c.01-8.84-7.15-16-15.99-16z\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/div\u003e\u003c/span\u003e\u003cspan class=\"stk-button__inner-text\"\u003eOpen Dashboard on Tableau Public\u003c/span\u003e\u003c/a\u003e\u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-0bbc2d0\" id=\"summary\" data-block-id=\"0bbc2d0\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eSummary\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003eSource Data\u0026nbsp;\u003c/strong\u003e— A four-table data set was generated \u003ca href=\"https://analytictalesmith.com/digital-goods-data-simulation/\" title=\"\"\u003eusing Python\u003c/a\u003e to simulate sales from an online digital goods store for the sake of this practice case study.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eProblem\u0026nbsp;\u003c/strong\u003e— How well is the shop performing, what items sell best, and what items can be paired together in promotions to boost sales?\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eInsights\u0026nbsp;\u003c/strong\u003e—\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003eMore users are ordering digital downloads from the site, with the overall number of orders trending upward.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003eThe digital assets created without a specific tool/program in mind sell really well, though the average profit per general purpose asset sold is lower than other categories.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003eTemplates and assets made for Slides, Powerpoint, and Notion sell the best, with Notion templates selling the second most assets by category and Slides assets generating the second highest profit by category\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003eThough assets for Word, Excel, Docs, and Canva sell similarly to other categories, the profit they generate lags behind\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eRecommendations \u003c/strong\u003e—\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003eDesign Bundles or Promos from Clusters\u003c/em\u003e — If your users are already buying certain items together, then take advantage of this knowledge and try to drive additional sales by rewarding customers with discounts for buying them together.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003eAssess General Purpose Asset Prices \u003c/em\u003e— The gap between units sold and profit in the general purpose category indicates that prices might be too low for the category. However, this is not \u003cem\u003enecessarily\u003c/em\u003e the case, and they may simply be selling well because they\u0026#8217;re what the store is known for.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003eIdentify Any Changes December \u0026#8217;22 \u0026#8211; Jan \u0026#8217;23\u003c/em\u003e — The number of orders jumped significantly in Jan. 2023, and figuring out whether this was noise or a result of something the store did (promotion, new products, etc.) would be beneficial for developing product development and marketing strategies moving forward. \u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"flex-col\",\"children\":[[\"$\",\"$L13\",null,{\"activeTitle\":\"Digital Goods Online Store Dashboard\"}],[\"$\",\"article\",null,{\"className\":\"flex flex-col grow max-w-7xl py-10 space-y-12\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"flex grow font-bold leading-tight text-4xl md:text-5xl\",\"children\":\"Digital Goods Online Store Dashboard\"}],[\"$\",\"div\",null,{\"className\":\"mt-12 mb-4 p-4 w-full  neobrutal bg-surface-container-lowest text-on-surface mb-12\",\"children\":[\"$\",\"$L14\",null,{\"htmlContent\":\"$15\"}]}]]}]]}]\n"])</script><script>self.__next_f.push([1,"10:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\
