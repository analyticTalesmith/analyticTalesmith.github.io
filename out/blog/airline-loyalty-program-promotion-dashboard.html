pt>self.__next_f.push([1,"\n\u003cdiv class=\"wp-block-stackable-subtitle stk-block-subtitle stk-block stk-7ad80a7\" data-block-id=\"7ad80a7\"\u003e\u003cp class=\"stk-block-subtitle__text stk-subtitle\"\u003eTableau dashboard visualizing key performance indicators related to an airline\u0026#8217;s loyalty membership program promotion\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-image stk-block-image stk-block stk-c3b71c8\" data-block-id=\"c3b71c8\"\u003e\u003cstyle\u003e.stk-c3b71c8 .stk-img-wrapper img{border-radius:8px !important}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1251\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/airlineDash.png\" width=\"1920\" height=\"1080\" alt=\"Dashboard visualizing KPIs of an airline loyalty membership program\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-button-group stk-block-button-group stk-block stk-14000c5\" data-block-id=\"14000c5\"\u003e\u003cdiv class=\"stk-row stk-inner-blocks stk-block-content stk-button-group\"\u003e\n\u003cdiv class=\"wp-block-stackable-button stk-block-button stk-block stk-7b9505a\" data-block-id=\"7b9505a\"\u003e\u003cstyle\u003e.stk-7b9505a,.stk-7b9505a .stk-button{width:100% !important}.stk-7b9505a{flex:1 1 0 !important}\u003c/style\u003e\u003ca class=\"stk-link stk-button stk--hover-effect-darken\" href=\"https://public.tableau.com/app/profile/jonathan.bailey/viz/AirlineLoyaltyProgramPerformance/LoyaltyProgramPerformanceDashboard\" title=\"Airline Loyalty Tableau Dashboard\" target=\"_blank\" rel=\"noreferrer noopener\"\u003e\u003cspan class=\"stk--svg-wrapper\"\u003e\u003cdiv class=\"stk--inner-svg\"\u003e\u003csvg aria-hidden=\"true\" focusable=\"false\" data-prefix=\"fas\" data-icon=\"chart-line\" class=\"svg-inline--fa fa-chart-line fa-w-16\" xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 512 512\" width=\"32\" height=\"32\"\u003e\u003cpath fill=\"currentColor\" d=\"M496 384H64V80c0-8.84-7.16-16-16-16H16C7.16 64 0 71.16 0 80v336c0 17.67 14.33 32 32 32h464c8.84 0 16-7.16 16-16v-32c0-8.84-7.16-16-16-16zM464 96H345.94c-21.38 0-32.09 25.85-16.97 40.97l32.4 32.4L288 242.75l-73.37-73.37c-12.5-12.5-32.76-12.5-45.25 0l-68.69 68.69c-6.25 6.25-6.25 16.38 0 22.63l22.62 22.62c6.25 6.25 16.38 6.25 22.63 0L192 237.25l73.37 73.37c12.5 12.5 32.76 12.5 45.25 0l96-96 32.4 32.4c15.12 15.12 40.97 4.41 40.97-16.97V112c.01-8.84-7.15-16-15.99-16z\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/div\u003e\u003c/span\u003e\u003cspan class=\"stk-button__inner-text\"\u003eOpen Dashboard on Tableau Public\u003c/span\u003e\u003c/a\u003e\u003c/div\u003e\n\u003c/div\u003e\u003c/div\u003e\n\n\n\n\u003ch2 class=\"wp-block-heading\" id=\"summary\"\u003eSummary\u003c/h2\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003eSource Data \u003c/strong\u003e— A two-table data set provided by \u003ca href=\"https://mavenanalytics.io/data-playground\" title=\"Maven Analytics\"\u003eMaven Analytics\u003c/a\u003e with over 422,000 records of a fictitious Canadian airline\u0026#8217;s loyalty program members and the flights they took from April 2012 to December 2018.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eBusiness Context \u003c/strong\u003e— The airline ran a promotion from Feb. \u0026#8211; Apr. 2018.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eProblem \u003c/strong\u003e— Did the promotion impact key performance and who did the promotion appeal to?\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eImportance \u003c/strong\u003e— Anyone can run a promotion; not everyone can design a successful promotion that drives key performance. It is crucial to assess the effectiveness of marketing strategies and critically determine what did and didn\u0026#8217;t work.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eInsights \u003c/strong\u003e—\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003e\u003cstrong\u003ePromotion Attracted New Customers\u003c/strong\u003e \u003c/em\u003e— Both gross and net enrollment during Feb. \u0026#8211; Apr. 2018 were significantly greater than would be expected without the promotion based on the growth trend prior to the promotion. Despite a peak in loyalty program membership cancellations in Aug. 2018, net enrollment has persisted at previous rates after the promotion end and active membership continues to steadily climb.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003e\u003cstrong\u003ePromotion Drove Summer 2018 Sales\u003c/strong\u003e \u003c/em\u003e— 2018 Quarters 2 \u0026#8211; 4 had increased flights compared to the same period in 2017.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003e\u003cstrong\u003ePromotional Enrollment Customers Differed from Standard Enrollment\u003c/strong\u003e \u003c/em\u003e— The promotion was \u003cem\u003eespecially \u003c/em\u003esuccessful in Quebec and British Columbia. It was also popular among consumers who were divorced, women, and/or had attained at most a Bachelor\u0026#8217;s degree, with each of these groups comprising more of the overall enrollment during the promotion than they did during standard enrollment.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003e\u003cem\u003eThreat of Churn is Increasing \u003c/em\u003e\u003c/strong\u003e— Gross enrollment trends upwards primarily because of the spike in enrollment during the promotion. Without the spike, gross enrollment is persisting at about 200 new members each month. However, the amount of cancellations each month is out-pacing new enrollments, and net enrollment is overall trending negatively.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eRecommendations \u003c/strong\u003e—\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003e\u003cem\u003eData\u003c/em\u003e\u003c/strong\u003e —\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003eAdd table tracking additional promotions and their key characteristics \u003c/em\u003e— While these data can demonstrate overall success of promotional enrollment and subsequent ticket sales, they are ultimately limited. If additional data was tracked regarding characteristics of each promotion, more robust analyses could be performed to more reliably indicate how success was driven by the promotions versus other contextual factors (e.g., standard business growth) or even noise (e.g., random coincidences falling on the tail ends of normal distributions). More data regarding the characteristics of the promotions could also enable optimization analyses to help design more effective promotions.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003eCollect cancellation data \u003c/em\u003e— More and more members are deciding to cancel or not renew their membership. Understanding what is driving this growing churn is crucial to managing enrollment and creating programs to maintain active members.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003e\u003cem\u003eBusiness \u003c/em\u003e\u003c/strong\u003e—\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cem\u003eMonitor churn \u003c/em\u003e— Higher counts of cancellation are expected as an organization has more active members. The problem arises when cancellation starts to outpace new enrollment. As it currently stands, cancellations are picking up in pace faster than enrollments. As long as net enrollment stays positive, the business will continue to see growth, but it is crucial to monitor these metrics to proactively implement strategies to avoid a decrease in active members.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cem\u003eExplore Promotional Opportunities \u003c/em\u003e— Something about the Q1 2018 promotion appealed to a subset of consumers, and it would be beneficial to assess whether that demographic\u0026#8217;s persona is successfully represented in business decisions moving forward. Additionally, promotional enrollment members have similar (though marginally greater) customer lifetime values as standard enrollment members, but they tend to fly less and therefore cost the airline less in reward points. Additional promotions could boost enrollment and drive relationships with valuable customers.\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003ch2 class=\"wp-block-heading\" id=\"project-overview\"\u003eProject Overview\u003c/h2\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\" id=\"preparing-data\"\u003ePreparing Data\u003c/h3\u003e\n\n\n\n\u003cp class=\"\"\u003eThe data comprised two tables: one tracking customer loyalty program membership (including demographics and enrollment details) and the other tracking loyalty program members\u0026#8217; activity (including how many flights they took, points they earned, and points they redeemed each month). Unfortunately, the data on customer salary had unexpected negative values and the provided data dictionary/codebook simply documented the \u0026#8220;Salary\u0026#8221; column as \u0026#8220;Annual Income\u0026#8221; without additional information on this particular characteristic of the data. Because of this, I chose to disregard salary from the analyses. Otherwise, the data were cleaned well and appeared as expected.\u003c/p\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\" id=\"exploratory-data-analysis\"\u003eExploratory Data Analysis\u003c/h3\u003e\n\n\n\n\u003cp class=\"\"\u003eGiven the business context and the available data, I knew my primary focus was going to be on how the membership program promotion impacted key performance indicators and the specific characteristics of promotional enrollment members compared to standard enrollment members. \u003c/p\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\" id=\"data-reshaping\"\u003eData Reshaping\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eThe loyalty program membership table is wide, but the flight information is long. \u003cem\u003eVery \u003c/em\u003elong, even. I could quickly throw the membership data into simple PivotTables and get the information I wanted from them without any additional steps. But the flight info needed to be aggregated across each unique loyalty program membership ID number to explore the data I wanted. So that meant enabling the DAX add-on in Excel so I could use the Data Analysis Expressions to aggregate. I specifically used DAX to calculate the lifetime total flights, total miles flown, average flight distance, points earned, and cost of redeemed points for each program member. These aggregations were then inserted into the loyalty membership table for convenient access as a PivotTable field.\u003c/p\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\" id=\"visualization-verification-source\"\u003eVisualization Verification Source\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eWith the data reshaped, I created PivotTables to explore descriptive characteristics of the data. The first goal was to simply figure out what story was embedded within the data. The second was to create a source to verify the accuracy of aggregations and visualizations I would later create in Tableau. \u003c/p\u003e\n\n\n\n\u003ch3 class=\"wp-block-heading\" id=\"tableau-data-visualization\"\u003eTableau Data Visualization\u003c/h3\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\" id=\"importing-the-data-and-building-relationships\"\u003eImporting the Data and Building Relationships\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eI have already discussed the first two CSVs I imported into Tableau: the wide program membership information and the long monthly customer reports. These were simply related by the shared customer ID. But I quickly realized that if I wanted to use the date and month columns effectively for loyalty program enrollment and cancellation metrics/visualizations, I needed to create a helper CSV. So I went into Excel and wrote the function to generate the first day of each month present in the data set to generate a data scaffolding framework. I related this CSV of dates to the membership info using two calculated fields, shown below, to track whether a member was actively enrolled during each month or not (EnrollStart \u0026lt;= Date \u0026lt;= EnrollEnd)\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan style=\"display:flex;align-items:center;padding:16px 0 0 16px;width:100%;text-align:left;background-color:#2e3440\"\u003e\u003cspan style=\"background:#c8d0e0;padding:0.3rem 0.5rem 0.2rem;border-radius:1rem;font-size:0.8em;line-height:1;height:1.25rem;text-align:center;display:inline-flex;align-items:center;justify-content:center;color:#2e3440\"\u003eEnrollStart\u003c/span\u003e\u003c/span\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"DATE(STR([Enrollment Month]) + \u0026quot; 1 \u0026quot; + STR([Enrollment Year]))\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9 rem;text-align:center;display:inline-flex;align-items:center;justify-content:center;color:#2e3440\"\u003eEnrollEnd\u003c/span\u003e\u003c/span\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"IF ISNULL([Cancellation Year])\n    THEN DATE(\u0026quot;12 31 3000\u0026quot;)\nELSE\n    DATE(STR([Cancellation Month]) + \u0026quot; 1 \u0026quot; + STR([Cancellation Year]))\nEND\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eIF\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eISNULL\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([Cancellation Year])\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eTHEN\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eDATE\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #ECEFF4\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #A3BE8C\"\u003e12 31 3000\u003c/span\u003e\u003cspan style=\"color: #ECEFF4\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e)\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eELSE\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e    \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eDATE\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSTR\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([Cancellation Month]) \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e+\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #ECEFF4\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #A3BE8C\"\u003e 1 \u003c/span\u003e\u003cspan style=\"color: #ECEFF4\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e+\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSTR\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([Cancellation Year]))\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eEND\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003ch4 class=\"wp-block-heading\" id=\"visualizations\"\u003eVisualizations\u003c/h4\u003e\n\n\n\n\u003cp class=\"\"\u003eI ultimately decided on a layout that focused first on the increased ticket sales following the promotion, then the report of gross and net enrollment rates, followed by the demographic differences in standard versus promotional enrollment members, concluding with the table of consumer characteristics based on enrollment type. The strategy was to order the metrics based by relevance to the business context and by the significance of the insights they visualized.\u003c/p\u003e\n\n\n\n\u003ch5 class=\"wp-block-heading\" id=\"flights-bar-in-bar\"\u003eFlights Bar-in-Bar\u003c/h5\u003e\n\n\n\n\u003cp class=\"\"\u003eThis visualization was straight forward, with the intention of showing how sales had improved after the promotion. The synchronized dual axis did the heavy lifting for this visualization.  Outside of that, the other major component was creating 4 calculated fields to drive a color-coded tooltip reporting the difference in flights and the change in percentage. The two pills shown below demonstrate the calculated fields used for the case flight increases, and the same logic was used in the second.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan style=\"display:flex;align-items:center;padding:16px 0 0 16px;width:100%;text-align:left;background-color:#2e3440\"\u003e\u003cspan style=\"background:#c8d0e0;padding:0.3rem 0.5rem 0.2rem;border-radius:1rem;font-size:0.8em;line-height:1;height:1.25rem;text-align:center;display:inline-flex;align-items:center;justify-content:center;color:#2e3440\"\u003eFlightImprove\u003c/span\u003e\u003c/span\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"IF SUM([2018 Flights])-SUM([2017 Flights]) \u0026gt; 0\n  THEN \u0026quot;+\u0026quot; + STR(SUM([2018 Flights])- SUM([2017 Flights])) + \u0026quot; flights\u0026quot;\nEND\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke- u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e+\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSTR\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eROUND\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e((\u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSUM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([2018 Flights])\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e-\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSUM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([2017 Flights]))\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e/\u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSUM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([2017 Flights])\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e*\u003c/span\u003e\u003cspan style=\"color: #B48EAD\"\u003e100\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e,\u003c/span\u003e\u003cspan style=\"color: #B48EAD\"\u003e1\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e)) \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e+\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e \u003c/span\u003e\u003cspan style=\"color: #ECEFF4\"\u003e\u0026quot;\u003c/span\u003e\u003cspan style=\"color: #A3BE8C\"\u003e%)\u003c/span\u003e\u003cspan style=\"color: #ECEFF4\"\u003e\u0026quot;\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003eEND\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eOf note here is why I chose to make these pills return strings rather than serve as measures that were formatted: I wanted all the output to be color coded, so all the relevant information is provided to the tooltip by the pills as shown below, with each pair color coded. Two of the pills will provide strings while the other two will be null (with the edge case that all four will be null in a month with exactly the same number of flights in 2017 and 2018, in which case, no info on change would show up).\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"\u0026lt;AGG(Flight Improve)\u0026gt;\u0026lt;AGG(Flight Improve %)\u0026gt;\u0026lt;AGG(Flight Worse)\u0026gt;\u0026lt;AGG(Flight Worse %)\u0026gt;\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003e\u0026lt;\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003eAGG(Flight Improve)\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e\u0026gt;\u0026lt;\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003eAGG(Flight Improve %)\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e\u0026gt;\u0026lt;\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003eAGG(Flight Worse)\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e\u0026gt;\u0026lt;\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003eAGG(Flight Worse %)\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e\u0026gt;\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003ch5 class=\"wp-block-heading\" id=\"enrollment-line-chart\"\u003eEnrollment Line Chart\u003c/h5\u003e\n\n\n\n\u003cp class=\"\"\u003eThis visualization is where my data scaffolding had a chance to shine. I used the continuous date to drive the three calculated fields: did each user enroll or cancel that month, and then the third to calculate the difference in monthly enrollments versus cancellations. I then added two vertical reference lines to mark the beginning and end of the loyalty program promotional period.\u003c/p\u003e\n\n\n\n\u003ch5 class=\"wp-block-heading\" id=\"demographic-percentage-point-pp-difference\"\u003eDemographic Percentage Point (PP) Difference\u003c/h5\u003e\n\n\n\n\u003ch6 class=\"wp-block-heading\" id=\"pp-bar-chart\"\u003ePP Bar Chart\u003c/h6\u003e\n\n\n\n\u003cp class=\"\"\u003eThis series of five visualizations is driven by two general calculated fields used across all visualizations and three calculated fields for each demographic dimension.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eThe first two fields, NonpromoID and PromoID, simply checked for each user\u0026#8217;s enrollment type and only returned their loyalty ID number if their enrollment type matched. This was used to get distinct counts of members based on their enrollment type for the demographic-specific calculated fields.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eFor this visualization, I wanted to determine what percent of the overall demographic factor each level of the demographic made up. I wanted this info for standard enrollment and promotional enrollment so I could then visualize the percentage point difference and which groups responded especially well to the promotion.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan style=\"display:flex;align-items:center;padding:16px 0 0 16px;width:100%;text-align:left;background-color:#2e3440\"\u003e\u003cspan style=\"background:#c8d0e0;padding:0.3rem 0.5rem 0.2rem;border-radius:1rem;font-size:0.8em;line-height:1;height:1.25rem;text-align:center;display:inline-flex;align-items:center;justify-content:center;color:#2e3440\"\u003eNonpromoID%\u003c/span\u003e\u003c/span\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"{ INCLUDE [DEMOGRAPHIC]:COUNTD([NonpromoID])}\n/{ EXCLUDE [DEMOGRAPHIC]:COUNTD([NonpromoID])}\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440f heck\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e{ \u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003eINCLUDE\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e [DEMOGRAPHIC]:COUNTD([NonpromoID])}\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #81A1C1\"\u003e/\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e{ EXCLUDE [DEMOGRAPHIC]:COUNTD([NonpromoID])}\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan style=\"display:flex;align-items:center;padding:16px 0 0 16px;width:100%;text-align:left;background-color:#2e3440\"\u003e\u003cspan style=\"background:#c8d0e0;padding:0.3rem 0.5rem 0.2rem;border-radius:1rem;font-size:0.8em;line-height:1;height:1.25rem;text-align:center;display:inline-flex;align-items:center;justify-content:center;color:#2e3440\"\u003ePPDifference\u003c/span\u003e\u003c/span\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"(SUM([PromoID%])-SUM([NonpromoID%]))*100\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e(\u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSUM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([PromoID%])\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e-\u003c/span\u003e\u003cspan style=\"color: #88C0D0\"\u003eSUM\u003c/span\u003e\u003cspan style=\"color: #D8DEE9FF\"\u003e([NonpromoID%]))\u003c/span\u003e\u003cspan style=\"color: #81A1C1\"\u003e*\u003c/span\u003e\u003cspan style=\"color: #B48EAD\"\u003e100\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eI used level of details in the calculated field to generate the appropriate values. The final step in creating the bar visualizations was to simply manually set their axes to include the overall minimum and maximum percentage point difference across demographic factors so that they stacked nicely.\u003c/p\u003e\n\n\n\n\u003ch6 class=\"wp-block-heading\" id=\"pp-map\"\u003ePP Map\u003c/h6\u003e\n\n\n\n\u003cp class=\"\"\u003eFor the map visualization, I simply created a map of Canada with each province filled to provide the shape of the country, and then layered a map on top that utilized the latitude and longitude to then pull the appropriate stats using the pills I mentioned above and fill each province with the appropriate color on a divergent scale. I also created two dashboard actions for this visualization. First, a select action so that if someone clicked on the background shape of Canada, Tableau would deselect it for them so that the highlight function wouldn\u0026#8217;t hide the visualization behind a single-colored block of Canada. Second, a highlight action so that as a stakeholder highlights the province on the map, the associated bar in the PP bar charts is highlighted as well.\u003c/p\u003e\n\n\n\n\u003ch5 class=\"wp-block-heading\" id=\"consumer-characteristic-table\"\u003eConsumer Characteristic Table\u003c/h5\u003e\n\n\n\n\u003cp class=\"\"\u003eI already had a lot going on visually on the dashboard, and I had 6 more variables I wanted to aggregate across 2 enrollment types. The dashboard didn\u0026#8217;t need the clutter from enough visualizations to report these data, so I decided to report them in a table formatted following the same style I had used up to this point. They are valuable info, but cost of additional nuance from more intricate visualizations would outweigh the benefits, considering their relevance/significance to the business context.\u003c/p\u003e\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"flex-col\",\"children\":[[\"$\",\"$L13\",null,{\"activeTitle\":\"Airline Loyalty Program Promotion Dashboard\"}],[\"$\",\"article\",null,{\"className\":\"flex flex-col grow max-w-7xl py-10 space-y-12\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"flex grow font-bold leading-tight text-4xl md:text-5xl\",\"children\":\"Airline Loyalty Program Promotion Dashboard\"}],[\"$\",\"div\",null,{\"className\":\"mt-12 mb-4 p-4 w-full  neobrutal bg-surface-container-lowest text-on-surface mb-12\",\"children\":[\"$\",\"$L14\",null,{\"htmlContent\":\"$15\"}]}]]}]]}]\n10:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"childr
