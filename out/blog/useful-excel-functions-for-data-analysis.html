,"\n\u003cp class=\"\"\u003eMicrosoft Excel contains hundreds of functions. While every function has its use, some are more generally useful across datasets and business needs. This post is a compiled list of all of my favorite functions that I use on a regular basis for my various data analysis needs, including conditional, lookup, and text functions, a few dynamic arrays, and some useful aggregation functions.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-image stk-block-image stk-block stk-c04e5ff\" data-block-id=\"c04e5ff\"\u003e\u003cstyle\u003e.stk-c04e5ff .stk-img-wrapper{height:300px !important}.stk-c04e5ff .stk-img-wrapper img{border-radius:8px !important}@media screen and (max-width:1023px){.stk-c04e5ff .stk-img-wrapper{height:100px !important}}@media screen and (max-width:767px){.stk-c04e5ff .stk-img-wrapper{height:100px !important}}\u003c/style\u003e\u003cfigure\u003e\u003cdiv class=\"stk-img-wrapper stk-image--shape-stretch\"\u003e\u003cimg loading=\"lazy\" decoding=\"async\" class=\"stk-img wp-image-1350\" src=\"https://analytictalesmith.com/wp-content/uploads/2023/11/mika-baumeister-Wpnoqo2plFA-unsplash-scaled.jpg\" width=\"2560\" height=\"1709\"/\u003e\u003c/div\u003e\u003c/figure\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-95885d6\" id=\"strong-functions-covered-in-this-post-strong\" data-block-id=\"95885d6\"\u003e\u003cstyle\u003e.stk-95885d6{margin-bottom:0px !important}\u003c/style\u003e\u003ch2 class=\"stk-block-heading__text\"\u003e\u003cstrong\u003eFunctions Covered in This Post:\u003c/strong\u003e\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cnav class=\"wp-block-stackable-table-of-contents stk-block-table-of-contents stk-block stk-c0bfb64\" data-block-id=\"c0bfb64\"\u003e\u003cul class=\"stk-table-of-contents__table\"\u003e\u003cli\u003e\u003ca href=\"#conditional-functions\"\u003eConditional Functions\u003c/a\u003e\u003cul\u003e\u003cli\u003e\u003ca href=\"#if\"\u003eIF\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#ifs\"\u003eIFS\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#and-or-xor-and-not\"\u003eAND, OR, XOR, and NOT\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#single-and-multi-criteria-aggregates\"\u003eSingle- and Multi-Criteria Aggregates\u003c/a\u003e\u003cul\u003e\u003cli\u003e\u003ca href=\"#sumif-s\"\u003eSUMIF(S)\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#averageif-s\"\u003eAVERAGEIF(S)\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#countif-s\"\u003eCOUNTIF(S)\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#minifs-and-maxifs\"\u003eMINIFS and MAXIFS\u003c/a\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#iferror\"\u003eIFERROR\u003c/a\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#lookup-functions\"\u003eLookup Functions\u003c/a\u003e\u003cul\u003e\u003cli\u003e\u003ca href=\"#xlookup\"\u003eXLOOKUP\u003c/a\u003e\u003c/li\u003e\u003cli\u003e\u003ca href=\"#index-and-xmatch\"\u003eINDEX and XMATCH\u003c/a\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/nav\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-a507ada\" id=\"some-definitions\" data-block-id=\"a507ada\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eSome Definitions\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-8c2a76d\" data-block-id=\"8c2a76d\"\u003e\u003cp class=\"stk-block-text__text\"\u003eBefore we get into the list of functions, following are some words you should be familiar with to help understand the various functions:\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cul class=\"wp-block-list\"\u003e\n\u003cli class=\"\"\u003e\u003cstrong\u003eArgument \u003c/strong\u003e— The input that you provide when typing in a function which gets passed into a function\u0026#8217;s parameter.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eCriteria \u003c/strong\u003e— Often used when functions evaluate conditionally over a range of cells, the criteria is an argument that you specify to say \u0026#8220;if the cell in that range meets this criteria, then use it in the function.\u0026#8221; Note that you can use an array constant if you want multiple conditions included in your criteria.\u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eLogical \u003c/strong\u003e— A function that ultimately evaluates to either TRUE or FALSE. \u003c/li\u003e\n\n\n\n\u003cli class=\"\"\u003e\u003cstrong\u003eParameter \u003c/strong\u003e— The name given to a variable in a function that references a piece of the provided input.\u003c/li\u003e\n\u003c/ul\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-744505d\" id=\"quick-excel-tips\" data-block-id=\"744505d\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eQuick Excel Tips\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-b2a3e3f\" data-block-id=\"b2a3e3f\"\u003e\u003cp class=\"stk-block-text__text\"\u003eWant more information about a function when typing it into Excel? Open the Excel Help menu and search for the function. Alternatively, start typing the function in a cell, and when you see the tooltip come up that tries to autocomplete the function you are typing, double click the function name, and then mouse your cursor over the function name. You will see a hyperlink to open the function documentation in the Excel Help menu. \u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-5adc32f\" data-block-id=\"5adc32f\"\u003e\u003cp class=\"stk-block-text__text\"\u003eWant a graphical user interface to make typing your functions a little easier? Press Ctrl A after you have typed \u0026#8220;=\u0026#8221; and the full name of the function in a cell. This will either bring up the function arguments window \u003cem\u003eor \u003c/em\u003ewill first bring up a window to select which version of the function you want to use and \u003cem\u003ethen \u003c/em\u003ebring up the function arguments window.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-0084988\" id=\"conditional-functions\" data-block-id=\"0084988\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eConditional Functions\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-31e7f7c\" data-block-id=\"31e7f7c\"\u003e\u003cp class=\"stk-block-text__text\"\u003eBy far \u003cem\u003ethe \u003c/em\u003emost useful set of functions I have found over my years are conditional functions. Generally speaking, they let you perform various functions only if the condition(s) you specify is met.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-ff04110\" id=\"if\" data-block-id=\"ff04110\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eIF\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=IF(logical_test, [value_if_true], [value_if_false])\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=IF(logical_test, [value_if_true], [value_if_false])\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eIF is perhaps \u003cem\u003ethe \u003c/em\u003efunction I use the most frequently in Excel. Given a logical test, you can then specify what you want to have happen when the test is TRUE. Or if you include an argument for value_if_false, what you want to happen depending on whether the test is TRUE or FALSE.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eIF is especially useful once you learn how to nest it. Like other syntaxes, you can include multiple layers of nesting to have branching logic to determine what happens in your cell. Admittedly, I don\u0026#8217;t often have nested IFs that have more than 2 or 3 layers, but if you find yourself needing to create nested IFs, simply pass another IF function as an argument into the appropriate \u0026#8220;value_if\u0026#8221; parameter like shown below.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=IF(logical_test,\n  IF(logical_test, [value_if_true_and_true], [value_if_true_and_false]),\n  IF(logical_test, [value_if_false_and_true], [value_if_false_and_false]))\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=IF(logical_test,\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e  IF(logical_test, [value_if_true_and_true], [value_if_true_and_false]),\u003c/span\u003e\u003c/span\u003e\n\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e  IF(logical_test, [value_if_false_and_true], [value_if_false_and_false]))\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eIn this example, the nested IF functions will evaluate to one of four \u0026#8220;value_if\u0026#8221; functions depending on whether the first logical test is TRUE or FALSE and then whether the logical test within that branch is TRUE or FALSE.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-f09d189\" id=\"ifs\" data-block-id=\"f09d189\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eIFS\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-1a286b5\" data-block-id=\"1a286b5\"\u003e\u003cp class=\"stk-block-text__text\"\u003eYou might find yourself wanting to have an IF function in Excel that works like a switch statement or an if/elseif/else block in other languages. IFS is a great option to achieve this in Excel.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=IFS(logical_test1, value_if_true1, [logical_test2, value_if_true] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=IFS(logical_test1, value_if_true1, [logical_test2, value_if_true] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-b36db2c\" data-block-id=\"b36db2c\"\u003e\u003cp class=\"stk-block-text__text\"\u003eIFS requires at least one logical and one value if that test is TRUE, but you can optionally include more logical tests. The function will check if the first condition is TRUE; if so, evaluate and return whatever argument you pass into value_if_true1. If the condition is FALSE and you have a second condition, then it checks the second condition the same way. The function will move through each of the logical/value pairs you pass as an argument until it either finds a level that evaluates to TRUE or all logical tests are FALSE (at which point you will see a #N/A error).\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-91b77f8\" id=\"and-or-xor-and-not\" data-block-id=\"91b77f8\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eAND, OR, XOR, and NOT\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=AND([logical1], [logical2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=AND([logical1], [logical2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=OR([logical1], [logical2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=OR([logical1], [logical2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=XOR([logical1], [logical2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=XOR([logical1], [logical2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=NOT(logical)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=NOT(logical)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eAND, OR, and XOR all work by checking a list of conditions. AND will return TRUE if every condition is TRUE; OR will return TRUE if at least one condition returns TRUE; XOR will return TRUE if an odd number of the logicals return TRUE.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eNote that with XOR, that means that an XOR function with 3 logicals can and will return TRUE if all 3 are TRUE, and that for XOR function with 3 or more logical tests, a final value of TRUE does \u003cem\u003enot \u003c/em\u003enecessarily mean that \u003cem\u003eonly \u003c/em\u003eone logical evaluated to TRUE.\u003c/p\u003e\n\n\n\n\u003cp class=\"\"\u003eNOT isn\u0026#8217;t necessary strictly speaking, \u003cem\u003ebut \u003c/em\u003eit can be useful to make complex functions a little more readable. It simply inverts TRUE to FALSE and FALSE to TRUE. So say you only want to return \u0026#8220;Contact\u0026#8221; if someone \u003cem\u003eisn\u0026#8217;t \u003c/em\u003eon your mailing list; your function might look like the following:\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=IF(NOT(Member), \u0026quot;Contact\u0026quot;)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=IF(NOT(Member), \u0026quot;Contact\u0026quot;)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eUsing these 4 functions, you can easily write more complex logical tests to use in other functions.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-3e5b0f9\" id=\"single-and-multi-criteria-aggregates\" data-block-id=\"3e5b0f9\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eSingle- and Multi-Criteria Aggregates\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-0057905\" id=\"sumif-s\" data-block-id=\"0057905\"\u003e\u003ch4 class=\"stk-block-heading__text\"\u003eSUMIF(S)\u003c/h4\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-5c49dcf\" data-block-id=\"5c49dcf\"\u003e\u003cp class=\"stk-block-text__text\"\u003eIf you want to calculate the sum only if a condition or set of criteria is true, you can use SUMIF and SUMIFS, respectively.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=SUMIF(range, criteria, [sum_range])\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=SUMIF(range, criteria, [sum_range])\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=SUMIFS(sum_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=SUMIFS(sum_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eNote that SUMIFS uses AND logic: it will only include a row in the sum if \u003cem\u003eall \u003c/em\u003ecriteria are met for a given row. If you want to use OR logic, you will have to use an array, like shown below:\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=SUM(SUMIF(A1:A6,{\u0026quot;a\u0026quot;,\u0026quot;b\u0026quot;},B1:B6))\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=SUM(SUMIF(A1:A6,{\u0026quot;a\u0026quot;,\u0026quot;b\u0026quot;},B1:B6))\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cp class=\"\"\u003eIn this example, I pass an array constant {\u0026#8220;a\u0026#8221;, \u0026#8220;b\u0026#8221;} as the argument indicating that if the value in column A for a row is either a or b, then take the value from column B and include it in the sum. But because I am using an array constant, the function\u0026#8217;s output would spill into additional cells; I get around this by wrapping the SUMIF in an additional SUM function to return a single value: the sum of values in column B where the value in column A is either a or b.\u003c/p\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-beb0da4\" id=\"averageif-s\" data-block-id=\"beb0da4\"\u003e\u003ch4 class=\"stk-block-heading__text\"\u003eAVERAGEIF(S)\u003c/h4\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-acc5cc7\" data-block-id=\"acc5cc7\"\u003e\u003cp class=\"stk-block-text__text\"\u003eSimilar to SUMIF and SUMIFS, AVERAGEIF and AVERAGEIFS will return the average of cells in a range that satisfy your criteria. Like SUMIFS, criteria in AVERAGEIFS evaluate using AND logic (i.e., all criteria must be met for a row to be included), so an array will need to be used with AVERAGEIF if you want to calculate an average using OR logic.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=AVERAGEIF(range, criteria, [average_range])\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=AVERAGEIF(range, criteria, [average_range])\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=AVERAGEIFS(average_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=AVERAGEIFS(average_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-f8624b6\" id=\"countif-s\" data-block-id=\"f8624b6\"\u003e\u003ch4 class=\"stk-block-heading__text\"\u003eCOUNTIF(S)\u003c/h4\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-4c55b78\" data-block-id=\"4c55b78\"\u003e\u003cp class=\"stk-block-text__text\"\u003eAnd by now, you probably are picking up on the pattern of these functions. COUNTIF and COUNTIFS are the conditional variant of COUNT where you only count rows where one (COUNTIF) or more (COUNTIFS) criteria are met.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=COUNTIF(range, criteria) \" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=COUNTIF(range, criteria) \u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=COUNTIFS(criteria_range1, criteria1, [criteria_range2, criteria2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=COUNTIFS(criteria_range1, criteria1, [criteria_range2, criteria2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-f9862f4\" id=\"minifs-and-maxifs\" data-block-id=\"f9862f4\"\u003e\u003ch4 class=\"stk-block-heading__text\"\u003eMINIFS and MAXIFS\u003c/h4\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-167cb47\" data-block-id=\"167cb47\"\u003e\u003cp class=\"stk-block-text__text\"\u003eWant to get the minimum and maximum values of a subset of data based on criteria? Lo and behold; there are premade functions for that too.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=MINIFS(min_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...) \" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=MINIFS(min_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...) \u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=MAXIFS(max_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=MAXIFS(max_range, criteria_range1, criteria1, [criteria_range2, criteria2] ...)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-5bcdc34\" id=\"iferror\" data-block-id=\"5bcdc34\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eIFERROR\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-b95da90\" data-block-id=\"b95da90\"\u003e\u003cp class=\"stk-block-text__text\"\u003eI would be lying if I said I used IFERROR \u003cem\u003eoften\u003c/em\u003e, but I \u003cem\u003edo \u003c/em\u003estill use it, especially when I\u0026#8217;m working on a workbook that I know other people will be opening and potentially trying to edit.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=IFERROR(value, value_if_error)\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=IFERROR(value, value_if_error)\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-40497a8\" data-block-id=\"40497a8\"\u003e\u003cp class=\"stk-block-text__text\"\u003eSimply put, this function will return whatever argument you pass into value if it detects an error. My most common use of this function is to \u003cem\u003etry \u003c/em\u003eto include some troubleshooting guidance to users by predicting what error they might make and then passing a string to display to guide the debugging.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-fd3f064\" id=\"lookup-functions\" data-block-id=\"fd3f064\"\u003e\u003ch2 class=\"stk-block-heading__text\"\u003eLookup Functions\u003c/h2\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-fc16cea\" data-block-id=\"fc16cea\"\u003e\u003cp class=\"stk-block-text__text\"\u003eThese functions boil down to one simple purpose: you have a value, and you need to find a related value in another table.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-4d2dba6\" id=\"xlookup\" data-block-id=\"4d2dba6\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eXLOOKUP\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-04d12cd\" data-block-id=\"04d12cd\"\u003e\u003cp class=\"stk-block-text__text\"\u003eIn the past, I might include HLOOKUP and VLOOKUP here, but I have yet to find any reason to use them over XLOOKUP, which has the flexibility of both other types of lookups in one, without the limitation of left-to-right search only. \u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=XLOOKUP(lookup_value, lookup_array, return_array, [if_not_found], [match_mode], [search_mode])  \" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=XLOOKUP(lookup_value, lookup_array, return_array, [if_not_found], [match_mode], [search_mode])  \u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-723f150\" data-block-id=\"723f150\"\u003e\u003cp class=\"stk-block-text__text\"\u003eThe function works by looking through the array or range in lookup_array (a column or row) for the lookup_value, and then if that value is found, returning the value from the same row or column in return_array.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-b25a599\" data-block-id=\"b25a599\"\u003e\u003cp class=\"stk-block-text__text\"\u003eOptionally, you can also specify what to return instead of a #N/A error if the text is not found by passing an argument into if_not_found.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-1d60b6a\" data-block-id=\"1d60b6a\"\u003e\u003cp class=\"stk-block-text__text\"\u003eMatch_mode lets you specify an exact match (0, the default) where if_not_found or #N/A is returned if the match isn\u0026#8217;t found, an exact match where the next smaller (-1) or next larger (1) item is returned, or a wildcard match (2).\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-58c5268\" data-block-id=\"58c5268\"\u003e\u003cp class=\"stk-block-text__text\"\u003eSearch_mode lets you specify whether to do a forward search from the first item (1, the default), a reverse search from the last item (-1) or a binary search if your data are already sorted in ascending (2) or descending (-2) order.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-heading stk-block-heading stk-block-heading--v2 stk-block stk-6b49e5d\" id=\"index-and-xmatch\" data-block-id=\"6b49e5d\"\u003e\u003ch3 class=\"stk-block-heading__text\"\u003eINDEX and XMATCH\u003c/h3\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-06e0681\" data-block-id=\"06e0681\"\u003e\u003cp class=\"stk-block-text__text\"\u003eI generally do not run into many cases where XLOOKUP isn\u0026#8217;t sufficient for my lookup needs, but if you need to have more precise control over your lookup and returns (e.g., perhaps you need to perform a two-way/matrix lookup), INDEX and XMATCH are a great option. Note that INDEX has an array form and a reference form.\u003c/p\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=XMATCH(lookup_value, lookup_array, [match_mode], [search_mode])   \" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=XMATCH(lookup_value, lookup_array, [match_mode], [search_mode])   \u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=INDEX(array, row_num, [column_num])\" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=INDEX(array, row_num, [column_num])\u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-kevinbatdorf-code-block-pro\" data-code-block-pro-font-family=\"Code-Pro-JetBrains-Mono\" style=\"font-size:.875rem;font-family:Code-Pro-JetBrains-Mono,ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;line-height:1.25rem;--cbp-tab-width:2;tab-size:var(--cbp-tab-width, 2)\"\u003e\u003cspan role=\"button\" tabindex=\"0\" data-code=\"=INDEX(reference, row_num, [column_num], [area_num]) \" style=\"color:#d8dee9ff;display:none\" aria-label=\"Copy\" class=\"code-block-pro-copy-button\"\u003e\u003csvg xmlns=\"http://www.w3.org/2000/svg\" style=\"width:24px;height:24px\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\" stroke-width=\"2\"\u003e\u003cpath class=\"with-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4\"\u003e\u003c/path\u003e\u003cpath class=\"without-check\" stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2\"\u003e\u003c/path\u003e\u003c/svg\u003e\u003c/span\u003e\u003cpre class=\"shiki nord\" style=\"background-color: #2e3440ff\" tabindex=\"0\"\u003e\u003ccode\u003e\u003cspan class=\"line\"\u003e\u003cspan style=\"color: #d8dee9ff\"\u003e=INDEX(reference, row_num, [column_num], [area_num]) \u003c/span\u003e\u003c/span\u003e\u003c/code\u003e\u003c/pre\u003e\u003c/div\u003e\n\n\n\n\u003cdiv class=\"wp-block-stackable-text stk-block-text stk-block stk-d9eef14\" data-block-id=\"d9eef14\"\u003e\u003cp class=\"stk-block-text__text\"\u003eGenerally speaking, regardless of your specific needs for using these functions, you will use XMATCH (or MATCH) to find the relative location of a lookup_value in a lookup_array, and nest that within an INDEX function to return a related value.\u003c/p\u003e\u003c/div\u003e\n"])</script><script>self.__next_f.push([1,"4:[\"$\",\"div\",null,{\"className\":\"flex-col\",\"children\":[[\"$\",\"$L13\",null,{\"activeTitle\":\"Useful Excel Functions for Data Analysis\"}],[\"$\",\"article\",null,{\"className\":\"flex flex-col grow max-w-7xl py-10 space-y-12\",\"children\":[[\"$\",\"h1\",null,{\"className\":\"flex grow font-bold leading-tight text-4xl md:text-5xl\",\"children\":\"Useful Excel Functions for Data Analysis\"}],[\"$\",\"div\",null,{\"className\":\"mt-12 mb-4 p-4 w-full  neobrutal bg-surface-container-lowest text-on-surface mb-12\",\"children\":[\"$\",\"$L14\",null,{\"htmlContent\":\"$15\"}]}]]}]]}]\n10:[[\"$\",\"meta\",\"0\",{\"name\":\"viewport\",\"content\":\"width=device-width, initial-scale=1\"}],[\"$\",\"meta\",\"1\",{\"charSet\":\"utf-8\"}],[\"$\",\"title\",\"2\",{\"children\":\"Useful Excel Functions for Data Analysis | Analytic Talesmith\"}],[\"$\",\"meta\",\"3\",{\"name\":\"description\",\"content\":\"Generated by create next app\"}],[\"$\",\"link\",\"4\",{\"rel\":\"icon\",\"href\":\"/icon.ico?e2e917e7b923cda7\",\"type\":\"image/x-icon\",\"sizes\":\"16x16\"}]]\n3:null\n"])</script></body></html>
